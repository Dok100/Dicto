name: Dicto
options:
  bundleIdPrefix: de.oliverkern
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: Dicto
    PRODUCT_BUNDLE_IDENTIFIER: de.oliverkern.dicto
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

    # Sandbox deaktiviert – CGEventTap und Input Monitoring erfordern das
    ENABLE_APP_SANDBOX: NO
    # Menübar-App: kein Dock-Icon, kein Hauptfenster
    # LSUIElement wird im Info.plist gesetzt

targets:
  Dicto:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        createIntermediateGroups: true
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: Dicto
        CFBundleDisplayName: Dicto
        CFBundleIdentifier: de.oliverkern.dicto
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "14.0"
        # Kein Dock-Icon – reiner Menübar-Agent
        LSUIElement: true
        NSMicrophoneUsageDescription: "Dicto benötigt Mikrofon-Zugriff für Push-to-Talk-Diktat."
        NSHumanReadableCopyright: "© 2026 Oliver Kern"
    entitlements:
      path: Sources/App/Dicto.entitlements
      properties:
        # Mikrofon-Entitlement (Sandbox ist deaktiviert, aber das bleibt best practice)
        com.apple.security.device.audio-input: true
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist

  DictoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests/AppTests
        createIntermediateGroups: true
    dependencies:
      - target: Dicto
    settings:
      base:
        INFOPLIST_FILE: ""
