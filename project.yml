name: Dicto
options:
  bundleIdPrefix: de.oliverkern
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: Dicto
    PRODUCT_BUNDLE_IDENTIFIER: de.oliverkern.dicto
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: LXXVUJZ9QT
    ENABLE_APP_SANDBOX: NO
    ENABLE_HARDENED_RUNTIME: YES

schemes:
  Dicto:
    build:
      targets:
        Dicto: all
        DictoTests: [test]
    test:
      targets:
        - DictoTests

targets:
  Dicto:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        createIntermediateGroups: true
      - path: Sources/App/Assets.xcassets
        type: folder
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: Sparkle
        product: Sparkle
      - sdk: Security.framework
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: Dicto
        CFBundleDisplayName: Dicto
        CFBundleIdentifier: de.oliverkern.dicto
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Dicto benötigt Mikrofon-Zugriff für Push-to-Talk-Diktat."
        NSSpeechRecognitionUsageDescription: "Dicto nutzt Apples Spracherkennung für lokale Live-Transkription."
        NSHumanReadableCopyright: "© 2026 Oliver Kern"
        SUFeedURL: "https://dok100.github.io/Dicto/appcast.xml"
        SUPublicEDKey: "0J3+Twx3WchZCJSAeRZ3/LRSRir9P0EspPZAvJUi/VY="
    entitlements:
      path: Sources/App/Dicto.entitlements
      properties:
        com.apple.security.device.audio-input: true
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        ENABLE_TESTABILITY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  DictoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests/AppTests
        createIntermediateGroups: true
    dependencies:
      - target: Dicto
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: DictoTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Dicto.app/Contents/MacOS/Dicto
        BUNDLE_LOADER: $(TEST_HOST)
